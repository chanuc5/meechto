
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Voice Studio | Advanced Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .studio-panel {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Range Sliders for Custom Player */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }

        /* Animations */
        @keyframes pulse-record {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }

        .recording-active .rec-indicator {
            animation: pulse-record 1.5s infinite;
            background-color: var(--danger);
        }
        .recording-paused .rec-indicator {
            background-color: #f59e0b;
            animation: none;
        }

        canvas {
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            border-radius: 12px;
            border: 1px solid #222;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4ade80;
        }

        #errorMessage {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 md:px-8 relative">

    <!-- Error Toast -->
    <div id="errorMessage" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500/90 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-2 opacity-0 pointer-events-none text-sm font-medium backdrop-blur-sm border border-red-400">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        <span id="errorText">Error message</span>
    </div>

    <header class="w-full max-w-5xl mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold tracking-wide text-amber-500">Pro Voice Studio</h1>
            <p class="text-gray-400 text-sm mt-1">Professional Recording Dashboard</p>
        </div>
        <div class="hidden md:flex gap-4 text-sm text-gray-400 items-center">
            <span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500"></div> System Active</span>
        </div>
    </header>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Panel: Recording Controls & Visualizer -->
        <div class="lg:col-span-2 space-y-6">
            <div class="studio-panel rounded-2xl p-6 relative">
                
                <!-- Settings Bar -->
                <div class="flex flex-wrap justify-between items-center mb-6 pb-4 border-b border-gray-800">
                    <h2 class="text-lg font-semibold flex items-center gap-2 text-gray-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                        Studio Mic
                    </h2>
                    
                    <div class="flex items-center gap-4 text-sm">
                        <label class="flex items-center cursor-pointer group" title="Kahi browser madhe he kam karnar nahi">
                            <div class="relative">
                                <input type="checkbox" id="noiseSuppression" class="sr-only" checked>
                                <div class="block bg-gray-600 w-10 h-6 rounded-full transition-colors group-hover:ring-2 ring-gray-700" id="nsBg"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform transform translate-x-4 bg-amber-400" id="nsDot"></div>
                            </div>
                            <span class="ml-3 text-gray-400 group-hover:text-gray-300 transition-colors">Noise Cancellation</span>
                        </label>
                    </div>
                </div>

                <!-- Visualizer -->
                <div class="mb-6 relative">
                    <canvas id="visualizer"></canvas>
                    <div class="absolute top-4 right-4 flex items-center gap-2 bg-black/60 px-3 py-1.5 rounded-full border border-gray-700 transition-colors duration-300" id="statusBadge">
                        <div class="w-3 h-3 rounded-full bg-gray-500 rec-indicator" id="recDot"></div>
                        <span class="text-xs font-bold tracking-wider text-gray-400" id="statusText">READY</span>
                    </div>
                </div>

                <!-- Timer & Controls -->
                <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                    
                    <div class="text-5xl font-mono tracking-wider font-light text-gray-200 drop-shadow-md" id="timerDisplay">
                        00:00.00
                    </div>

                    <div class="flex items-center gap-4">
                        <!-- Add Marker Button -->
                        <button id="btnMarker" class="btn-action w-12 h-12 rounded-full bg-gray-800 text-gray-400 flex items-center justify-center border border-gray-700 hover:text-amber-400 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all" disabled title="Khun Kara (Marker)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path><line x1="12" x2="12" y1="7" y2="13"></line><line x1="15" x2="9" y1="10" y2="10"></line></svg>
                        </button>

                        <!-- Main Record / Pause Button -->
                        <button id="btnRecord" class="btn-action w-16 h-16 rounded-full bg-amber-500 text-black flex items-center justify-center hover:bg-amber-400 shadow-[0_0_20px_rgba(245,158,11,0.2)] transition-all">
                            <!-- Mic Icon -->
                            <svg id="iconRecord" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                            <!-- Pause Icon -->
                            <svg id="iconPause" class="hidden" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>

                        <!-- Stop Button -->
                        <button id="btnStop" class="btn-action w-12 h-12 rounded-full bg-gray-800 text-red-500 flex items-center justify-center border border-gray-700 hover:bg-red-500/20 disabled:opacity-30 disabled:cursor-not-allowed transition-all" disabled title="Thambva (Stop)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                </div>

                <!-- Markers Display Area -->
                <div id="markersArea" class="mt-4 flex flex-wrap gap-2 min-h-[30px] p-2 bg-black/20 rounded-lg border border-white/5">
                    <span class="text-xs text-gray-600 self-center italic">Markers yithe distil...</span>
                </div>

            </div>
        </div>

        <!-- Right Panel: Recordings Library -->
        <div class="lg:col-span-1">
            <div class="studio-panel rounded-2xl p-6 h-full flex flex-col max-h-[600px]">
                <h2 class="text-lg font-semibold mb-4 pb-2 border-b border-gray-800 flex items-center justify-between text-gray-200">
                    <span>Recordings</span>
                    <span id="recordingsCount" class="text-xs bg-gray-800 px-2 py-1 rounded-md text-amber-500 font-mono">0</span>
                </h2>
                
                <div id="recordingsList" class="flex-1 overflow-y-auto pr-2 space-y-4">
                    <div id="emptyState" class="h-full flex flex-col items-center justify-center text-gray-500 space-y-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="opacity-50"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                        <p class="text-sm">Kahihi record kelele nahi.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- UI Elements ---
            const btnRecord = document.getElementById('btnRecord');
            const iconRecord = document.getElementById('iconRecord');
            const iconPause = document.getElementById('iconPause');
            const btnStop = document.getElementById('btnStop');
            const btnMarker = document.getElementById('btnMarker');
            
            const timerDisplay = document.getElementById('timerDisplay');
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            
            const recordingsList = document.getElementById('recordingsList');
            const emptyState = document.getElementById('emptyState');
            const recordingsCount = document.getElementById('recordingsCount');
            const markersArea = document.getElementById('markersArea');

            const errorToast = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // --- Canvas Setup ---
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d', { alpha: false }); // Optimize canvas
            
            // --- State Variables ---
            let mediaRecorder = null;
            let audioChunks = [];
            let stream = null;
            
            // App state
            const STATE = {
                IDLE: 'idle',
                RECORDING: 'recording',
                PAUSED: 'paused'
            };
            let currentState = STATE.IDLE;
            
            // Timer variables
            let startTime = 0;
            let elapsedTime = 0;
            let timerInterval = null;

            // Audio Context for Visualizer
            let audioCtx = null;
            let analyser = null;
            let source = null;
            let animationId = null;

            // Markers
            let currentMarkers = [];
            let recordingCounter = 0;

            // --- Error Handling ---
            function showError(msg) {
                errorText.textContent = msg;
                errorToast.style.opacity = '1';
                setTimeout(() => { errorToast.style.opacity = '0'; }, 4000);
            }

            // --- Toggle UI Logic ---
            const nsCheckbox = document.getElementById('noiseSuppression');
            const nsBg = document.getElementById('nsBg');
            const nsDot = document.getElementById('nsDot');
            
            nsCheckbox.addEventListener('change', (e) => {
                if(e.target.checked) {
                    nsBg.classList.replace('bg-gray-600', 'bg-amber-500');
                    nsDot.classList.add('translate-x-4');
                } else {
                    nsBg.classList.replace('bg-amber-500', 'bg-gray-600');
                    nsDot.classList.remove('translate-x-4');
                }
            });
            // Init toggle
            nsBg.classList.replace('bg-gray-600', 'bg-amber-500');

            // --- Canvas & Visualizer Logic ---
            function resizeCanvas() {
                // Handle high DPI displays
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                
                canvasCtx.scale(dpr, dpr);
                // We use rect.width/height for drawing calculations now
                canvas.style.width = `${rect.width}px`;
                canvas.style.height = `${rect.height}px`;
                
                if (currentState === STATE.IDLE || currentState === STATE.PAUSED) {
                    drawIdleWave(rect.width, rect.height);
                }
            }
            window.addEventListener('resize', resizeCanvas);

            function drawIdleWave(w, h) {
                canvasCtx.fillStyle = '#0a0a0a';
                canvasCtx.fillRect(0, 0, w, h);
                canvasCtx.beginPath();
                canvasCtx.moveTo(0, h / 2);
                canvasCtx.lineTo(w, h / 2);
                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = '#333';
                canvasCtx.stroke();
            }

            function startVisualizer(audioStream) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if(audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // Cleanup previous connections if any
                if(source) source.disconnect();
                
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaStreamSource(audioStream);
                source.connect(analyser);
                analyser.fftSize = 1024; // Good balance of performance and resolution
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function draw() {
                    if (currentState === STATE.IDLE) return;
                    animationId = requestAnimationFrame(draw);

                    const rect = canvas.getBoundingClientRect();
                    const w = rect.width;
                    const h = rect.height;

                    if (currentState === STATE.PAUSED) {
                        drawIdleWave(w, h);
                        return;
                    }

                    analyser.getByteTimeDomainData(dataArray);

                    canvasCtx.fillStyle = '#0a0a0a';
                    canvasCtx.fillRect(0, 0, w, h);

                    canvasCtx.lineWidth = 2;
                    
                    const gradient = canvasCtx.createLinearGradient(0, 0, w, 0);
                    gradient.addColorStop(0, "#f59e0b");
                    gradient.addColorStop(0.5, "#fbbf24");
                    gradient.addColorStop(1, "#f59e0b");
                    canvasCtx.strokeStyle = gradient;

                    canvasCtx.beginPath();

                    const sliceWidth = w * 1.0 / bufferLength;
                    let x = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * h / 2;

                        if (i === 0) {
                            canvasCtx.moveTo(x, y);
                        } else {
                            canvasCtx.lineTo(x, y);
                        }
                        x += sliceWidth;
                    }

                    canvasCtx.lineTo(w, h / 2);
                    canvasCtx.stroke();
                }
                draw();
            }

            // Initial sizing
            setTimeout(resizeCanvas, 100);

            // --- Timer Logic ---
            function formatTime(ms) {
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const milliseconds = Math.floor((ms % 1000) / 10);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
            }

            function updateTimer() {
                const now = Date.now();
                const currentDuration = elapsedTime + (now - startTime);
                timerDisplay.textContent = formatTime(currentDuration);
            }

            // --- Core Recording Logic ---
            async function startRecordingProcess() {
                try {
                    const useNoiseSuppression = nsCheckbox.checked;
                    
                    // Request Mic
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: useNoiseSuppression,
                            noiseSuppression: useNoiseSuppression,
                            autoGainControl: true
                        } 
                    });

                    // Determine optimal mime type
                    const options = { mimeType: 'audio/webm;codecs=opus' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options.mimeType = 'audio/webm'; // Fallback
                        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                            options.mimeType = ''; // Let browser decide
                        }
                    }

                    mediaRecorder = new MediaRecorder(stream, options);
                    audioChunks = [];
                    currentMarkers = [];
                    markersArea.innerHTML = ''; // Clear markers

                    // Data handling
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            audioChunks.push(e.data);
                        }
                    };

                    mediaRecorder.onstop = handleRecordingComplete;

                    // Update State
                    currentState = STATE.RECORDING;
                    
                    // Update UI
                    updateUIForState();

                    // Start Timer
                    elapsedTime = 0;
                    startTime = Date.now();
                    timerInterval = setInterval(updateTimer, 50);

                    // Start Visualizer
                    startVisualizer(stream);

                    // Start actual recording
                    // requestData every 1 second to ensure chunks are collected regularly
                    // this prevents data loss if stop/pause is called abruptly
                    mediaRecorder.start(1000); 

                } catch (err) {
                    console.error("Mic Error:", err);
                    showError("Microphone start krtana problem aala. Permission check kra.");
                }
            }

            function pauseRecordingProcess() {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.pause();
                    // Force data collection before pausing
                    mediaRecorder.requestData();
                }

                currentState = STATE.PAUSED;
                
                // Timer
                elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);

                updateUIForState();
            }

            function resumeRecordingProcess() {
                if (mediaRecorder && mediaRecorder.state === 'paused') {
                    mediaRecorder.resume();
                }

                currentState = STATE.RECORDING;
                
                // Timer
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 50);

                updateUIForState();
            }

            function stopRecordingProcess() {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    // Stop mic tracks completely
                    stream.getTracks().forEach(track => track.stop());
                }

                // Timer cleanup
                clearInterval(timerInterval);
                // Calculate final time before resetting state
                if(currentState === STATE.RECORDING) {
                    elapsedTime += Date.now() - startTime;
                }

                currentState = STATE.IDLE;
                
                // Visualizer cleanup
                if (animationId) cancelAnimationFrame(animationId);
                const rect = canvas.getBoundingClientRect();
                drawIdleWave(rect.width, rect.height);

                updateUIForState();
            }

            // Update DOM based on state machine
            function updateUIForState() {
                switch(currentState) {
                    case STATE.RECORDING:
                        statusBadge.className = 'absolute top-4 right-4 flex items-center gap-2 bg-black/60 px-3 py-1.5 rounded-full border border-red-900 recording-active transition-colors';
                        statusText.textContent = 'RECORDING';
                        statusText.className = 'text-xs font-bold tracking-wider text-red-500';
                        
                        iconRecord.classList.add('hidden');
                        iconPause.classList.remove('hidden');
                        btnRecord.className = 'btn-action w-16 h-16 rounded-full bg-gray-700 text-white flex items-center justify-center hover:bg-gray-600 shadow-none transition-all';
                        
                        btnStop.disabled = false;
                        btnMarker.disabled = false;
                        break;

                    case STATE.PAUSED:
                        statusBadge.className = 'absolute top-4 right-4 flex items-center gap-2 bg-black/60 px-3 py-1.5 rounded-full border border-amber-900 recording-paused transition-colors';
                        statusText.textContent = 'PAUSED';
                        statusText.className = 'text-xs font-bold tracking-wider text-amber-500';
                        
                        iconPause.classList.add('hidden');
                        iconRecord.classList.remove('hidden');
                        btnRecord.className = 'btn-action w-16 h-16 rounded-full bg-amber-500 text-black flex items-center justify-center hover:bg-amber-400 shadow-[0_0_20px_rgba(245,158,11,0.2)] transition-all';
                        break;

                    case STATE.IDLE:
                        statusBadge.className = 'absolute top-4 right-4 flex items-center gap-2 bg-black/60 px-3 py-1.5 rounded-full border border-gray-700 transition-colors';
                        statusText.textContent = 'READY';
                        statusText.className = 'text-xs font-bold tracking-wider text-gray-400';
                        
                        iconPause.classList.add('hidden');
                        iconRecord.classList.remove('hidden');
                        btnRecord.className = 'btn-action w-16 h-16 rounded-full bg-amber-500 text-black flex items-center justify-center hover:bg-amber-400 shadow-[0_0_20px_rgba(245,158,11,0.2)] transition-all';
                        
                        btnStop.disabled = true;
                        btnMarker.disabled = true;
                        timerDisplay.textContent = "00:00.00";
                        
                        // Show placeholder in markers area
                        if(currentMarkers.length === 0) {
                             markersArea.innerHTML = '<span class="text-xs text-gray-600 self-center italic">Markers yithe distil...</span>';
                        }
                        break;
                }
            }

            function addMarker() {
                if(currentState !== STATE.RECORDING) return;
                
                const currentDuration = elapsedTime + (Date.now() - startTime);
                currentMarkers.push(currentDuration);
                
                // Clear placeholder if it's the first marker
                if(currentMarkers.length === 1) {
                    markersArea.innerHTML = '';
                }

                const markerBadge = document.createElement('span');
                markerBadge.className = 'bg-gray-800 text-amber-500 text-[10px] px-2 py-1 rounded border border-gray-700 font-mono flex items-center gap-1';
                markerBadge.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 22 8.5 22 21.5 12 21.5 2 21.5 2 8.5 12 2"></polygon></svg> ${formatTime(currentDuration).slice(0,5)}`;
                markersArea.appendChild(markerBadge);
            }

            // --- Save and Generate Player ---
            function handleRecordingComplete() {
                if (audioChunks.length === 0) {
                    showError("Kahihi record zala nahi. Puna prayatna kra.");
                    return;
                }

                // Determine file type based on what was actually recorded
                const mimeType = mediaRecorder.mimeType || 'audio/webm';
                const blob = new Blob(audioChunks, { type: mimeType });
                
                const audioUrl = URL.createObjectURL(blob);
                recordingCounter++;
                
                const date = new Date();
                const defaultName = `Record_${date.getHours()}${date.getMinutes()}_${recordingCounter}`;
                
                createPlayerItem(audioUrl, blob, defaultName, [...currentMarkers], elapsedTime, mimeType);
                
                // Reset for next recording
                audioChunks = [];
            }

            function createPlayerItem(src, blob, name, markers, totalDurationMs, mimeType) {
                if(emptyState) emptyState.style.display = 'none';

                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-[#1a1a1a] p-4 rounded-xl border border-gray-800 flex flex-col gap-3 transition-all hover:border-gray-700';

                const audio = new Audio(src);
                audio.preload = 'metadata'; // Load metadata early
                
                const ext = mimeType.includes('mp4') ? 'mp4' : 'webm'; // Basic extension guess
                const fileSize = (blob.size / 1024 / 1024).toFixed(2); // MB

                itemDiv.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div class="flex-1 w-full flex items-center gap-2">
                            <input type="text" value="${name}" class="bg-transparent border-none text-sm font-medium text-white focus:ring-0 focus:outline-none w-full max-w-[200px] border-b border-transparent focus:border-amber-500 p-0" />
                            <span class="text-[10px] text-gray-500 bg-gray-900 px-1.5 py-0.5 rounded border border-gray-800">${fileSize}MB</span>
                        </div>
                        <div class="flex gap-2 self-end sm:self-auto">
                            <select class="speed-select bg-gray-800 text-xs text-gray-300 border border-gray-700 rounded px-1 outline-none cursor-pointer hover:bg-gray-700">
                                <option value="1">1x Speed</option>
                                <option value="1.5">1.5x Speed</option>
                                <option value="2">2x Speed</option>
                            </select>
                            <button class="dl-btn p-1.5 bg-gray-800 rounded text-gray-400 hover:text-amber-500 hover:bg-gray-700 transition-colors" title="Download">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                            </button>
                            <button class="del-btn p-1.5 bg-gray-800 rounded text-gray-400 hover:text-red-500 hover:bg-gray-700 transition-colors" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 mt-2">
                        <button class="play-btn w-10 h-10 rounded-full bg-amber-500 text-black flex items-center justify-center shrink-0 hover:bg-amber-400 transition-colors">
                            <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <svg class="pause-icon hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>
                        
                        <div class="flex-1 flex flex-col gap-1 w-full">
                            <div class="flex justify-between text-[11px] text-gray-400 font-mono px-1">
                                <span class="curr-time">00:00</span>
                                <span class="total-time">${formatTime(totalDurationMs).slice(0,5)}</span>
                            </div>
                            <div class="relative w-full h-4 flex items-center">
                                <input type="range" class="seek-bar w-full absolute z-20 m-0" value="0" min="0" max="100" step="0.1">
                                <!-- Marker Indicators Container -->
                                <div class="marker-container absolute top-0 left-0 w-full h-full pointer-events-none z-10 px-[6px]"></div>
                            </div>
                        </div>
                    </div>
                `;

                // Add Marker UI to the seekbar safely
                const markerContainer = itemDiv.querySelector('.marker-container');
                markers.forEach(markMs => {
                    const percentage = (markMs / totalDurationMs) * 100;
                    if(percentage >= 0 && percentage <= 100) {
                        const markDiv = document.createElement('div');
                        markDiv.className = 'absolute top-1/2 -translate-y-1/2 w-1.5 h-3 bg-red-500 rounded-sm shadow-[0_0_5px_rgba(239,68,68,0.8)]';
                        // Adjust position slightly to align with thumb
                        markDiv.style.left = `calc(${percentage}% - 3px)`; 
                        markerContainer.appendChild(markDiv);
                    }
                });

                // Logic Bindings
                const playBtn = itemDiv.querySelector('.play-btn');
                const playIcon = itemDiv.querySelector('.play-icon');
                const pauseIcon = itemDiv.querySelector('.pause-icon');
                const seekBar = itemDiv.querySelector('.seek-bar');
                const currTimeEl = itemDiv.querySelector('.curr-time');
                const totalTimeEl = itemDiv.querySelector('.total-time'); // For updating duration when loaded
                const speedSelect = itemDiv.querySelector('.speed-select');
                const dlBtn = itemDiv.querySelector('.dl-btn');
                const delBtn = itemDiv.querySelector('.del-btn');
                const nameInput = itemDiv.querySelector('input[type="text"]');

                // Sometimes calculated duration is slightly off from actual audio duration
                audio.addEventListener('loadedmetadata', () => {
                    if(audio.duration && audio.duration !== Infinity) {
                        const actualDurationMs = audio.duration * 1000;
                        totalTimeEl.textContent = formatTime(actualDurationMs).slice(0,5);
                    }
                });

                // Play / Pause Toggle
                playBtn.addEventListener('click', () => {
                    if(audio.paused) {
                        // Pause all others
                        document.querySelectorAll('audio').forEach(a => { 
                            if(a !== audio && !a.paused) {
                                a.pause();
                                // We need to trigger the UI update on the other players manually if we hide their native controls
                                const event = new Event('pause');
                                a.dispatchEvent(event);
                            }
                        });
                        audio.play().catch(e => console.error("Playback error", e));
                    } else {
                        audio.pause();
                    }
                });

                audio.addEventListener('play', () => {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    playBtn.classList.add('ring-2', 'ring-amber-500/50');
                });
                audio.addEventListener('pause', () => {
                    pauseIcon.classList.add('hidden');
                    playIcon.classList.remove('hidden');
                    playBtn.classList.remove('ring-2', 'ring-amber-500/50');
                });

                // Audio Progress
                let isDragging = false;
                
                seekBar.addEventListener('mousedown', () => isDragging = true);
                seekBar.addEventListener('mouseup', () => isDragging = false);
                seekBar.addEventListener('touchstart', () => isDragging = true);
                seekBar.addEventListener('touchend', () => isDragging = false);

                audio.addEventListener('timeupdate', () => {
                    if(audio.duration && !isDragging) {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        seekBar.value = percent;
                        
                        const mins = Math.floor(audio.currentTime / 60);
                        const secs = Math.floor(audio.currentTime % 60);
                        currTimeEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    }
                });

                audio.addEventListener('ended', () => {
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                    playBtn.classList.remove('ring-2', 'ring-amber-500/50');
                    seekBar.value = 0;
                    currTimeEl.textContent = "00:00";
                });

                // Seek
                seekBar.addEventListener('input', () => {
                    // Update time display immediately while dragging
                    if(audio.duration) {
                        const targetTime = (seekBar.value / 100) * audio.duration;
                        const mins = Math.floor(targetTime / 60);
                        const secs = Math.floor(targetTime % 60);
                        currTimeEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    }
                });

                seekBar.addEventListener('change', () => {
                    if(audio.duration) {
                        audio.currentTime = (seekBar.value / 100) * audio.duration;
                    }
                });

                // Speed
                speedSelect.addEventListener('change', (e) => {
                    audio.playbackRate = parseFloat(e.target.value);
                });

                // Download
                dlBtn.addEventListener('click', () => {
                    const a = document.createElement('a');
                    a.href = src;
                    // Sanitize filename
                    const safeName = (nameInput.value || 'Recording').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    a.download = `${safeName}.${ext}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                });

                // Delete
                delBtn.addEventListener('click', () => {
                    audio.pause();
                    URL.revokeObjectURL(src); // Free memory
                    
                    itemDiv.style.opacity = '0';
                    itemDiv.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        itemDiv.remove();
                        updateCount();
                    }, 200);
                });

                // Insert at top
                recordingsList.prepend(itemDiv);
                updateCount();
            }

            function updateCount() {
                const count = recordingsList.querySelectorAll('.bg-\\[\\#1a1a1a\\]').length;
                recordingsCount.textContent = count;
                if(count === 0 && emptyState) {
                    emptyState.style.display = 'flex';
                }
            }

            // --- Main Button Bindings ---
            btnRecord.addEventListener('click', () => {
                if (currentState === STATE.IDLE) {
                    startRecordingProcess();
                } else if (currentState === STATE.RECORDING) {
                    pauseRecordingProcess();
                } else if (currentState === STATE.PAUSED) {
                    resumeRecordingProcess();
                }
            });

            btnStop.addEventListener('click', stopRecordingProcess);
            btnMarker.addEventListener('click', addMarker);

        });
    </script>
</body>
</html>
