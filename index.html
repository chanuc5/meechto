<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Chanu | Professional Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS सुधारणा: कचरा साफ केला आहे */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --accent: #6366f1;
            --accent-soft: #e0e7ff;
            --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            --radius-xl: 30px;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--primary-bg);
            position: relative;
        }

        /* Page System */
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 120px;
            animation: pageIn 0.5s ease;
        }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            padding: 40px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greet-box h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            line-height: 1.2;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: var(--accent);
            border: 3px solid white;
            box-shadow: var(--shadow-premium);
            overflow: hidden;
            cursor: pointer;
        }

        /* Improved Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .smart-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 24px 20px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255,255,255,0.7);
            transition: var(--transition-smooth);
            cursor: pointer;
            position: relative;
        }

        .smart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .smart-card i {
            font-size: 1.4rem;
            margin-bottom: 15px;
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
        }

        /* Bottom Nav - Fixed UX */
        .nav-dock {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            height: 75px;
            border-radius: 28px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
            z-index: 1000;
        }

        .dock-item {
            color: var(--text-sub);
            font-size: 1.3rem;
            transition: var(--transition-smooth);
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
        }

        .dock-item.active {
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* Profile & Settings List */
        .action-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-item {
            background: white;
            padding: 18px 22px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-premium);
            font-weight: 500;
            cursor: pointer;
        }

        .action-item i { color: var(--accent); width: 20px; }

        /* Modal */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: none; align-items: flex-end; z-index: 2000;
        }
        .sheet {
            background: white; width: 100%; border-radius: 40px 40px 0 0;
            padding: 40px 25px; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .overlay.active { display: flex; }
        .overlay.active .sheet { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Home Page -->
        <div id="page-home" class="page active">
            <header>
                <div class="greet-box">
                    <p id="greet-text" style="color:var(--text-sub); font-size: 0.9rem;"></p>
                    <h1>Dev Chanu</h1>
                </div>
                <div class="avatar" onclick="navTo('profile')">
                    <img src="https://ui-avatars.com/api/?name=Chanu&background=6366f1&color=fff" style="width:100%">
                </div>
            </header>

            <div class="grid-layout">
                <div class="smart-card" onclick="showDetails('Learning', '85% of your React course is done. Complete the final module.', '#6366f1')">
                    <i class="fas fa-graduation-cap" style="color:#6366f1"></i>
                    <h3 style="font-size: 1rem;">Learning</h3>
                    <div class="progress-bar"><div class="progress-fill" style="width: 85%"></div></div>
                </div>
                <div class="smart-card" onclick="showDetails('Daily Tasks', '4 out of 10 tasks finished. You are lagging behind!', '#f59e0b')">
                    <i class="fas fa-list-check" style="color:#f59e0b"></i>
                    <h3 style="font-size: 1rem;">Tasks</h3>
                    <div class="progress-bar"><div class="progress-fill" style="width: 40%; background:#f59e0b"></div></div>
                </div>
                <div class="smart-card" onclick="showDetails('Analytics', 'Your coding time increased by 20% this week.', '#10b981')">
                    <i class="fas fa-chart-pie" style="color:#10b981"></i>
                    <h3 style="font-size: 1rem;">Stats</h3>
                    <p style="font-size: 0.7rem; color: var(--text-sub); margin-top:5px;">+20% growth</p>
                </div>
                <div class="smart-card" onclick="showDetails('Deadlines', 'Portfolio submission in 2 days.', '#ef4444')">
                    <i class="fas fa-hourglass-half" style="color:#ef4444"></i>
                    <h3 style="font-size: 1rem;">Due</h3>
                    <p style="font-size: 0.7rem; color: #ef4444; font-weight: 600; margin-top:5px;">In 2 Days</p>
                </div>
            </div>
        </div>

        <!-- Categories Page -->
        <div id="page-grid" class="page">
            <h2 style="margin: 20px 0;">Topic Folders</h2>
            <div class="action-list">
                <div class="action-item"><i class="fas fa-folder"></i> Web Development Projects</div>
                <div class="action-item"><i class="fas fa-folder"></i> UI/UX Case Studies</div>
                <div class="action-item"><i class="fas fa-folder"></i> Backend Architecture</div>
            </div>
        </div>

        <!-- Alerts Page -->
        <div id="page-alerts" class="page">
            <h2 style="margin: 20px 0;">Activity Feed</h2>
            <div class="action-list">
                <div class="action-item" style="border-left: 4px solid var(--accent);">
                    <div>
                        <p style="font-size: 0.9rem;">Course Milestone Unlocked</p>
                        <small style="color:var(--text-sub)">10 minutes ago</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Page -->
        <div id="page-profile" class="page">
            <div style="text-align: center; margin-top: 30px;">
                <div style="width:100px; height:100px; border-radius:30px; background:white; margin:0 auto; padding:5px; box-shadow: var(--shadow-premium);">
                    <img src="https://ui-avatars.com/api/?name=Chanu&background=6366f1&color=fff" style="width:100%; border-radius:25px;">
                </div>
                <h2 style="margin-top:15px;">Developer Chanu</h2>
                <p style="color:var(--text-sub)">Full Stack Engineer</p>
            </div>
            <div class="action-list">
                <div class="action-item"><i class="fas fa-user-gear"></i> Account Settings</div>
                <div class="action-item"><i class="fas fa-shield-halved"></i> Privacy Control</div>
                <div class="action-item" style="color: #ef4444;"><i class="fas fa-power-off" style="color: #ef4444;"></i> Log out</div>
            </div>
        </div>

        <!-- Navigation Dock -->
        <nav class="nav-dock">
            <div class="dock-item active" onclick="navTo('home', this)"><i class="fas fa-house-user"></i></div>
            <div class="dock-item" onclick="navTo('grid', this)"><i class="fas fa-shapes"></i></div>
            <div class="dock-item" style="background:var(--accent); color:white; border-radius:20px; height:55px; width:55px; margin-top:-40px; box-shadow: 0 10px 20px rgba(99,102,241,0.4);" onclick="showDetails('Quick Action', 'What do you want to add today?', '#6366f1')">
                <i class="fas fa-plus"></i>
            </div>
            <div class="dock-item" onclick="navTo('alerts', this)"><i class="fas fa-bolt"></i></div>
            <div class="dock-item" onclick="navTo('profile', this)"><i class="fas fa-fingerprint"></i></div>
        </nav>
    </div>

    <!-- Bottom Sheet Modal -->
    <div class="overlay" id="overlay" onclick="closeSheet()">
        <div class="sheet" onclick="event.stopPropagation()">
            <div id="sheet-icon" style="width:60px; height:60px; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; color:white;">
                <i class="fas fa-info-circle"></i>
            </div>
            <h2 id="sheet-title">Title</h2>
            <p id="sheet-desc" style="color:var(--text-sub); margin: 15px 0 30px;"></p>
            <button onclick="closeSheet()" style="width:100%; padding:18px; border:none; background:var(--text-main); color:white; border-radius:20px; font-weight:600; cursor:pointer;">Acknowledge</button>
        </div>
    </div>

    <script>
        function updateTime() {
            const h = new Date().getHours();
            const gt = document.getElementById('greet-text');
            if(h < 12) gt.innerText = "Good Morning,";
            else if(h < 17) gt.innerText = "Good Afternoon,";
            else if(h < 21) gt.innerText = "Good Evening,";
            else gt.innerText = "Good Night,";
        }

        function navTo(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            if(el) {
                document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function showDetails(title, desc, color) {
            document.getElementById('sheet-title').innerText = title;
            document.getElementById('sheet-desc').innerText = desc;
            document.getElementById('sheet-icon').style.backgroundColor = color;
            document.getElementById('overlay').classList.add('active');
        }

        function closeSheet() {
            document.getElementById('overlay').classList.remove('active');
        }

        updateTime();
    </script>
</body>
</html>
