    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- Inline SVG Icons for Reliability ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                target: <path d="M12 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2zM20 4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                layout: <path d="M3 3h7v7H3zm11 0h7v7h-7zm-11 11h7v7H3zm11 0h7v7h-7z"/>,
                stats: <path d="M12 20V10M18 20V4M6 20v-4"/>,
                plus: <path d="M12 5v14M5 12h14"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>,
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6-6-6"/>,
                check: <path d="M20 6 9 17l-5-5"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>
            };

            return (
                <svg 
                    viewBox="0 0 24 24" 
                    width={size} 
                    height={size} 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2.5" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [viewDate, setViewDate] = useState(new Date());
            
            // --- State Initialization with LocalStorage ---
            const [habits, setHabits] = useState(() => {
                const saved = localStorage.getItem('hp_habits');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: "Wake up 6:30", color: "#6366f1" },
                    { id: 2, name: "Drink Water (3L)", color: "#0ea5e9" },
                    { id: 3, name: "Read 10 Pages", color: "#f59e0b" },
                    { id: 4, name: "3k Jogging", color: "#10b981" },
                    { id: 5, name: "No Sugar", color: "#f43f5e" }
                ];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('hp_history');
                return saved ? JSON.parse(saved) : {};
            });

            // Persist to LocalStorage
            useEffect(() => {
                localStorage.setItem('hp_habits', JSON.stringify(habits));
            }, [habits]);

            useEffect(() => {
                localStorage.setItem('hp_history', JSON.stringify(history));
            }, [history]);

            // --- Constants & Math ---
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const currentMonth = viewDate.getMonth();
            const currentYear = viewDate.getFullYear();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            const CENTER = 350;
            const RADIUS_INNER = 110;
            const RADIUS_OUTER = 310;
            const START_ANGLE = -Math.PI / 2;

            const toggleHabit = (habitId, day) => {
                const dateKey = `${currentYear}-${currentMonth + 1}-${day}`;
                const key = `${habitId}-${dateKey}`;
                const current = history[key] || 0; // 0: none, 1: success, 2: fail
                const next = (current + 1) % 3;
                setHistory(prev => ({ ...prev, [key]: next }));
            };

            const getSegmentPath = (day, hIdx) => {
                const totalDays = 31; // Consistent grid for all months
                const angleStep = (2 * Math.PI) / totalDays;
                const sAngle = START_ANGLE + (day - 1) * angleStep + 0.01;
                const eAngle = START_ANGLE + day * angleStep - 0.01;
                
                const ringWidth = (RADIUS_OUTER - RADIUS_INNER) / habits.length;
                const rIn = RADIUS_INNER + (habits.length - 1 - hIdx) * ringWidth + 2;
                const rOut = rIn + ringWidth - 2;

                const x1 = CENTER + rIn * Math.cos(sAngle);
                const y1 = CENTER + rIn * Math.sin(sAngle);
                const x2 = CENTER + rOut * Math.cos(sAngle);
                const y2 = CENTER + rOut * Math.sin(sAngle);
                const x3 = CENTER + rOut * Math.cos(eAngle);
                const y3 = CENTER + rOut * Math.sin(eAngle);
                const x4 = CENTER + rIn * Math.cos(eAngle);
                const y4 = CENTER + rIn * Math.sin(eAngle);

                return `M ${x1} ${y1} L ${x2} ${y2} A ${rOut} ${rOut} 0 0 1 ${x3} ${y3} L ${x4} ${y4} A ${rIn} ${rIn} 0 0 0 ${x1} ${y1} Z`;
            };

            const stats = useMemo(() => {
                let success = 0;
                let totalPossible = habits.length * daysInMonth;
                
                Object.entries(history).forEach(([key, val]) => {
                    const [hId, y, m, d] = key.split('-');
                    if (parseInt(y) === currentYear && parseInt(m) === (currentMonth + 1) && val === 1) {
                        success++;
                    }
                });

                return {
                    percent: totalPossible > 0 ? Math.round((success / totalPossible) * 100) : 0,
                    success
                };
            }, [history, habits, currentMonth, currentYear]);

            const changeMonth = (offset) => {
                setViewDate(new Date(currentYear, currentMonth + offset, 1));
            };

            return (
                <div className="min-h-screen pb-32 flex flex-col">
                    {/* Top Bar */}
                    <header className="bg-white/80 backdrop-blur-xl sticky top-0 z-50 border-b border-slate-100 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200">
                                <Icon name="target" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tight text-slate-900 leading-none">HabitPro</h1>
                                <span className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Premium v2.0</span>
                            </div>
                        </div>
                        <button 
                            onClick={() => setActiveTab('settings')}
                            className={`p-2 rounded-xl transition-colors ${activeTab === 'settings' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}
                        >
                            <Icon name="settings" size={22} />
                        </button>
                    </header>

                    <main className="flex-1 max-w-xl mx-auto w-full px-4 pt-6 overflow-hidden">
                        {activeTab === 'tracker' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {/* Date Navigation */}
                                <div className="flex items-center justify-between px-2">
                                    <button onClick={() => changeMonth(-1)} className="p-3 bg-white shadow-sm border border-slate-100 rounded-2xl hover:bg-slate-50 active:scale-95 transition-all">
                                        <Icon name="left" size={20} className="text-slate-600" />
                                    </button>
                                    <div className="text-center">
                                        <h2 className="text-2xl font-extrabold text-slate-900">{months[currentMonth]}</h2>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-[0.3em]">{currentYear}</p>
                                    </div>
                                    <button onClick={() => changeMonth(1)} className="p-3 bg-white shadow-sm border border-slate-100 rounded-2xl hover:bg-slate-50 active:scale-95 transition-all">
                                        <Icon name="right" size={20} className="text-slate-600" />
                                    </button>
                                </div>

                                {/* Radial Wheel Container */}
                                <div className="glass-card rounded-[3.5rem] p-4 relative aspect-square flex items-center justify-center overflow-visible">
                                    {/* Stats Center */}
                                    <div className="absolute z-10 text-center pointer-events-none">
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Score</p>
                                        <p className="text-5xl font-black text-slate-900 leading-none">{stats.percent}%</p>
                                        <p className="text-[10px] font-bold text-indigo-500 mt-2 bg-indigo-50 px-3 py-1 rounded-full">{stats.success} Points</p>
                                    </div>

                                    {/* SVG Chart */}
                                    <svg viewBox="0 0 700 700" className="w-full h-full drop-shadow-2xl">
                                        {/* Day Numbers Labels */}
                                        {Array.from({ length: 31 }).map((_, i) => {
                                            const angle = START_ANGLE + (i + 0.5) * (2 * Math.PI / 31);
                                            const r = RADIUS_OUTER + 25;
                                            const isFuture = (i + 1) > daysInMonth;
                                            return (
                                                <text 
                                                    key={i} 
                                                    x={CENTER + r * Math.cos(angle)} 
                                                    y={CENTER + r * Math.sin(angle)} 
                                                    textAnchor="middle" 
                                                    dominantBaseline="middle"
                                                    className={`text-[12px] font-black ${isFuture ? 'fill-slate-100' : 'fill-slate-400'}`}
                                                >
                                                    {i + 1}
                                                </text>
                                            );
                                        })}

                                        {/* Habit Segments Grid */}
                                        {Array.from({ length: 31 }).map((_, dIdx) => {
                                            const day = dIdx + 1;
                                            const isInvalidDay = day > daysInMonth;
                                            
                                            return habits.map((habit, hIdx) => {
                                                const dateKey = `${currentYear}-${currentMonth + 1}-${day}`;
                                                const status = history[`${habit.id}-${dateKey}`] || 0;
                                                
                                                let fillColor = "#F1F5F9"; // Default
                                                if (status === 1) fillColor = "#10b981"; // Success
                                                if (status === 2) fillColor = "#f43f5e"; // Fail
                                                if (isInvalidDay) fillColor = "#F8FAFC";

                                                return (
                                                    <path 
                                                        key={`${habit.id}-${day}`} 
                                                        d={getSegmentPath(day, hIdx)} 
                                                        fill={fillColor} 
                                                        stroke="white" 
                                                        strokeWidth="1.5"
                                                        className={`habit-segment ${isInvalidDay ? 'pointer-events-none opacity-20' : 'cursor-pointer hover:brightness-95 active:scale-[0.99]'}`}
                                                        onClick={() => !isInvalidDay && toggleHabit(habit.id, day)}
                                                    />
                                                );
                                            });
                                        })}
                                    </svg>
                                </div>

                                {/* Legend/Habit List */}
                                <div className="space-y-3 px-2">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Active Habits</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {habits.map((h, i) => (
                                            <div key={h.id} className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
                                                <div className="w-2 h-2 rounded-full" style={{ background: h.color }}></div>
                                                <span className="text-[11px] font-bold text-slate-600">{h.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h2 className="text-2xl font-black text-slate-900">Performance</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-emerald-500 p-6 rounded-[2.5rem] text-white shadow-lg shadow-emerald-100">
                                        <p className="text-[10px] font-black uppercase opacity-80">Total Success</p>
                                        <p className="text-4xl font-black">{stats.success}</p>
                                    </div>
                                    <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-lg shadow-indigo-100">
                                        <p className="text-[10px] font-black uppercase opacity-80">Consistency</p>
                                        <p className="text-4xl font-black">{stats.percent}%</p>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100">
                                    <h3 className="text-sm font-bold text-slate-800 mb-4">Habit Breakdown</h3>
                                    <div className="space-y-4">
                                        {habits.map(h => {
                                            const hSuccess = Object.entries(history).filter(([key, val]) => 
                                                key.startsWith(`${h.id}-`) && val === 1
                                            ).length;
                                            return (
                                                <div key={h.id} className="space-y-2">
                                                    <div className="flex justify-between text-xs font-bold">
                                                        <span className="text-slate-600">{h.name}</span>
                                                        <span className="text-indigo-600">{hSuccess} total</span>
                                                    </div>
                                                    <div className="h-2 bg-slate-50 rounded-full overflow-hidden">
                                                        <div 
                                                            className="h-full bg-indigo-500 transition-all duration-1000" 
                                                            style={{ width: `${Math.min(100, (hSuccess / daysInMonth) * 100)}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-2xl font-black text-slate-900">Settings</h2>
                                    <button 
                                        onClick={() => {
                                            const newHabit = { id: Date.now(), name: "New Habit", color: "#" + Math.floor(Math.random()*16777215).toString(16) };
                                            setHabits([...habits, newHabit]);
                                        }}
                                        className="bg-indigo-600 text-white p-2 rounded-xl shadow-lg hover:scale-105 transition-all"
                                    >
                                        <Icon name="plus" size={20} />
                                    </button>
                                </div>

                                <div className="space-y-3">
                                    {habits.map((h, i) => (
                                        <div key={h.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 group">
                                            <input 
                                                type="color" 
                                                value={h.color}
                                                onChange={(e) => {
                                                    const n = [...habits];
                                                    n[i].color = e.target.value;
                                                    setHabits(n);
                                                }}
                                                className="w-10 h-10 rounded-lg cursor-pointer border-none"
                                            />
                                            <input 
                                                className="flex-1 bg-transparent font-bold text-slate-700 outline-none" 
                                                value={h.name} 
                                                onChange={(e) => {
                                                    const n = [...habits];
                                                    n[i].name = e.target.value;
                                                    setHabits(n);
                                                }}
                                            />
                                            <button 
                                                onClick={() => setHabits(habits.filter(x => x.id !== h.id))}
                                                className="p-2 text-slate-300 hover:text-red-500 transition-colors"
                                            >
                                                <Icon name="trash" size={18} />
                                            </button>
                                        </div>
                                    ))}
                                    {habits.length === 0 && (
                                        <div className="text-center py-12">
                                            <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <Icon name="target" size={32} className="text-slate-300" />
                                            </div>
                                            <p className="text-slate-400 font-bold">No habits yet. Add some!</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm glass-card border border-white/50 px-2 py-2 rounded-[2rem] flex justify-between items-center z-[100]">
                        <button 
                            onClick={() => setActiveTab('tracker')} 
                            className={`flex-1 flex flex-col items-center py-3 rounded-2xl transition-all ${activeTab === 'tracker' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 scale-105' : 'text-slate-400 hover:text-slate-600'}`}
                        >
                            <Icon name="layout" size={20} />
                            <span className="text-[9px] font-black uppercase mt-1">Tracker</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('stats')} 
                            className={`flex-1 flex flex-col items-center py-3 rounded-2xl transition-all ${activeTab === 'stats' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 scale-105' : 'text-slate-400 hover:text-slate-600'}`}
                        >
                            <Icon name="stats" size={20} />
                            <span className="text-[9px] font-black uppercase mt-1">Stats</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('settings')} 
                            className={`flex-1 flex flex-col items-center py-3 rounded-2xl transition-all ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 scale-105' : 'text-slate-400 hover:text-slate-600'}`}
                        >
                            <Icon name="settings" size={20} />
                            <span className="text-[9px] font-black uppercase mt-1">Setup</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
